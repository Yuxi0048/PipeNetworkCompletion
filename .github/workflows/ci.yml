name: CI

on:
  push:
    branches: [Final, main]
    tags: ["v*"]
  pull_request:
    branches: [Final, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          environment-file: environment.yml
          activate-environment: pipe-network-completion
          use-mamba: true

      - name: Install package + dev tools
        run: |
          python -m pip install -e ".[test]"
          python -m pip install ruff

      - name: Ruff
        run: ruff check pipe_network_completion scripts process.py tests

      - name: Pytest
        run: pytest -ra

      - name: Verify environment
        run: python scripts/verify_environment.py
